name: CI

on:
  push:
    branches: [main, feature/**, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: >
          pytest tests/
          -v --tb=short
          --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  skill-lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate SKILL.md files (root + nested)
        run: |
          python << 'PYEOF'
          import yaml, pathlib, sys
          SKILL_PATHS = [
              'skill/maya-mgear/SKILL.md',
              'SKILL.md',
          ]
          for sp in SKILL_PATHS:
              p = pathlib.Path(sp)
              for doc in yaml.safe_load_all(p.read_text()):
                  if doc is not None:
                      data = doc
                      break
              assert data.get('name') == 'maya-mgear', f'{sp}: Missing or wrong skill name'
              dcc_mcp = data.get('metadata', {}).get('dcc-mcp', {})
              assert 'depends' in dcc_mcp, f'{sp}: Missing depends under metadata.dcc-mcp'
              print(f'{sp} OK')
          PYEOF

      - name: Validate tools.yaml files (root + nested)
        run: |
          python << 'PYEOF'
          import yaml, pathlib, sys
          TOOLS_PATHS = [
              'skill/maya-mgear/tools.yaml',
              'tools.yaml',
          ]
          for tp in TOOLS_PATHS:
              p = pathlib.Path(tp)
              data = yaml.safe_load(p.read_text())
              tools = data.get('tools', [])
              assert len(tools) == 5, f'{tp}: Expected 5 tools, got {len(tools)}'
              names = [t['name'] for t in tools]
              assert 'inspect_mgear_environment' in names
              assert 'list_shifter_components' in names
              assert 'create_shifter_guide_from_template' in names
              assert 'build_shifter_rig' in names
              assert 'export_shifter_guide_template' in names
              print(f'{tp}: All {len(tools)} tools validated OK: {names}')
          PYEOF

      - name: Detect drift — root vs nested copies
        run: |
          echo "## Drift detection: root-level vs nested skill files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ROOT_SKILL="SKILL.md"
          NESTED_SKILL="skill/maya-mgear/SKILL.md"
          ROOT_TOOLS="tools.yaml"
          NESTED_TOOLS="skill/maya-mgear/tools.yaml"

          drift=0

          # SKILL.md diff
          if diff -u "$NESTED_SKILL" "$ROOT_SKILL"; then
            echo "✅ SKILL.md: root matches nested copy" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ SKILL.md: DRIFT DETECTED — root and nested copies differ!" >> $GITHUB_STEP_SUMMARY
            drift=1
          fi

          # tools.yaml diff
          if diff -u "$NESTED_TOOLS" "$ROOT_TOOLS"; then
            echo "✅ tools.yaml: root matches nested copy" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ tools.yaml: DRIFT DETECTED — root and nested copies differ!" >> $GITHUB_STEP_SUMMARY
            drift=1
          fi

          if [ $drift -ne 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Action required" >> $GITHUB_STEP_SUMMARY
            echo "Root-level SKILL.md / tools.yaml must stay in sync with the nested copies under skill/maya-mgear/. Update the root copies to match." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # NOTE: SKILL.md / tools.yaml / drift checks are also performed by
          # the skill-package job (scripts/validate_skill_package.py) for
          # comprehensive coverage including source_file resolution,
          # marketplace metadata, version consistency, and no-Maya smoke.

  marketplace-lint:
    name: Lint Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate marketplace.json
        run: |
          python << 'PYEOF'
          import json, pathlib, sys

          # -- schema: verbatim from dcc-mcp-core crates/dcc-mcp-catalog/src/lib.rs --
          # MARKETPLACE_V1_SCHEMA_JSON — single source of truth for marketplace-v1.
          # Any drift between this CI check and core's Rust-side loader is a bug.
          SCHEMA = {
              "$schema": "https://json-schema.org/draft/2020-12/schema",
              "$id": "https://dcc-mcp.github.io/schemas/marketplace-v1.schema.json",
              "title": "DCC-MCP Marketplace Catalog",
              "description": "Schema for marketplace.json catalog entries",
              "type": "object",
              "required": ["entries"],
              "properties": {
                  "version": {"type": "string"},
                  "entries": {
                      "type": "array",
                      "items": {"$ref": "#/$defs/entry"}
                  }
              },
              "additionalProperties": False,
              "$defs": {
                  "entry": {
                      "type": "object",
                      "required": ["name", "description"],
                      "properties": {
                          "name":        {"type": "string", "minLength": 1},
                          "description": {"type": "string", "minLength": 1},
                          "dcc":         {"type": "array", "items": {"type": "string"}, "uniqueItems": True},
                          "url":         {"type": "string"},
                          "tags":        {"type": "array", "items": {"type": "string"}, "uniqueItems": True},
                          "version":          {"type": "string"},
                          "min_core_version": {"type": "string"},
                          "icon":             {"type": "string"},
                          "maintainer":       {"type": "string"},
                          "install": {
                              "type": "object",
                              "required": ["type"],
                              "properties": {
                                  "type":   {"type": "string", "enum": ["git", "zip", "path"]},
                                  "url":    {"type": "string"},
                                  "ref":    {"type": "string"},
                                  "sha256": {"type": "string"}
                              },
                              "additionalProperties": False
                          }
                      },
                      "additionalProperties": False
                  }
              }
          }

          from jsonschema import validate, ValidationError

          p = pathlib.Path("marketplace.json")
          assert p.exists(), "marketplace.json not found"

          with open(p) as f:
              data = json.load(f)

          try:
              validate(instance=data, schema=SCHEMA)
          except ValidationError as e:
              print(f"marketplace.json validation FAILED: {e.message}")
              print(f"  at: {'/'.join(str(p) for p in e.absolute_path)}")
              if e.absolute_schema_path:
                  print(f"  schema path: {'/'.join(str(p) for p in e.absolute_schema_path)}")
              sys.exit(1)

          # additional repo-level check: relative icon paths must exist on disk
          errors = []
          for i, entry in enumerate(data.get("entries", [])):
              icon = entry.get("icon")
              if icon and isinstance(icon, str) and not icon.startswith("https://"):
                  if not pathlib.Path(icon).exists():
                      errors.append(f"entries[{i}].icon: file not found: {icon!r}")
          if errors:
              print("icon file check FAILED:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"marketplace.json OK ({len(data.get('entries', []))} entries)")
          PYEOF

  skill-package:
    name: Validate Skill Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run skill package validation
        run: python scripts/validate_skill_package.py
