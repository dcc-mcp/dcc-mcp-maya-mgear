name: CI

on:
  push:
    branches: [main, feature/**, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: >
          pytest tests/
          -v --tb=short
          --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  skill-lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate SKILL.md
        run: |
          python << 'PYEOF'
          import yaml, pathlib
          p = pathlib.Path('src/dcc_mcp_maya_mgear/skills/maya-mgear/SKILL.md')
          for doc in yaml.safe_load_all(p.read_text()):
              if doc is not None:
                  data = doc
                  break
          assert data.get('name') == 'maya-mgear', 'Missing or wrong skill name'
          dcc_mcp = data.get('metadata', {}).get('dcc-mcp', {})
          assert 'depends' in dcc_mcp, 'Missing depends under metadata.dcc-mcp'
          print('SKILL.md OK')
          PYEOF

      - name: Validate tools.yaml
        run: |
          python << 'PYEOF'
          import yaml, pathlib
          p = pathlib.Path('src/dcc_mcp_maya_mgear/skills/maya-mgear/tools.yaml')
          data = yaml.safe_load(p.read_text())
          tools = data.get('tools', [])
          assert len(tools) == 5, f'Expected 5 tools, got {len(tools)}'
          names = [t['name'] for t in tools]
          assert 'inspect_mgear_environment' in names
          assert 'list_shifter_components' in names
          assert 'create_shifter_guide_from_template' in names
          assert 'build_shifter_rig' in names
          assert 'export_shifter_guide_template' in names
          print(f'All {len(tools)} tools validated OK: {names}')
          PYEOF

  marketplace-lint:
    name: Lint Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate marketplace.json
        run: |
          python << 'PYEOF'
          import json, pathlib, re, sys

          p = pathlib.Path("marketplace.json")
          assert p.exists(), "marketplace.json not found"

          with open(p) as f:
              data = json.load(f)

          errors = []

          # -- top-level schema --
          if not isinstance(data, dict):
              errors.append("Top-level must be a JSON object")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          if "version" not in data:
              errors.append("Missing top-level 'version' field")
          elif data["version"] != "1":
              errors.append(f"Unsupported schema version: {data['version']}")

          entries = data.get("entries")
          if not isinstance(entries, list) or len(entries) == 0:
              errors.append("'entries' must be a non-empty array")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          REQUIRED = ["name", "description", "dcc", "tags"]
          VALID_INSTALL_TYPES = {"git"}

          for i, entry in enumerate(entries):
              prefix = f"entries[{i}]"

              # guard: entry must be a dict before any .get() call
              if not isinstance(entry, dict):
                  errors.append(f"{prefix}: must be a JSON object, got {type(entry).__name__}")
                  continue

              # required fields
              for field in REQUIRED:
                  if field not in entry or not entry[field]:
                      errors.append(f"{prefix}: missing or empty '{field}'")

              # name must be a valid package slug
              name = entry.get("name", "")
              if name and not re.match(r"^[a-z0-9][a-z0-9_.-]*[a-z0-9]$", name):
                  errors.append(f"{prefix}: 'name' must be a valid slug: {name!r}")

              # dcc must be a non-empty list of strings
              dcc = entry.get("dcc")
              if isinstance(dcc, list) and len(dcc) > 0:
                  if not all(isinstance(d, str) and d for d in dcc):
                      errors.append(f"{prefix}: 'dcc' must be a list of non-empty strings")
              else:
                  errors.append(f"{prefix}: 'dcc' must be a non-empty array")

              # tags must be a non-empty list
              tags = entry.get("tags")
              if isinstance(tags, list) and len(tags) > 0:
                  if not all(isinstance(t, str) and t for t in tags):
                      errors.append(f"{prefix}: 'tags' must be a list of non-empty strings")
              else:
                  errors.append(f"{prefix}: 'tags' must be a non-empty array")

              # version inside entry should be semver-like
              ver = entry.get("version", "")
              if ver and not re.match(r"^\d+\.\d+\.\d+", ver):
                  errors.append(f"{prefix}: 'version' should be semver-like: {ver!r}")

              # install block — required; CLI install fails without it
              inst = entry.get("install")
              if inst is None:
                  errors.append(f"{prefix}: missing required 'install' block")
              elif not isinstance(inst, dict):
                  errors.append(f"{prefix}: 'install' must be an object")
              else:
                  itype = inst.get("type", "")
                  if not itype:
                      errors.append(f"{prefix}: install.type is required")
                  elif itype not in VALID_INSTALL_TYPES:
                      errors.append(f"{prefix}: install.type must be one of {sorted(VALID_INSTALL_TYPES)}")

                  iurl = inst.get("url", "")
                  if not iurl:
                      errors.append(f"{prefix}: install.url is required")
                  elif not iurl.startswith("https://"):
                      errors.append(f"{prefix}: install.url must be an HTTPS URL")

                  iref = inst.get("ref", "")
                  if not iref:
                      errors.append(f"{prefix}: install.ref is required")
                  elif itype == "git" and re.search(r"[<>|;]", iref):
                      errors.append(f"{prefix}: install.ref contains unsafe characters: {iref!r}")

              # icon field validation
              icon = entry.get("icon")
              if icon is not None:
                  if not isinstance(icon, str):
                      errors.append(f"{prefix}: 'icon' must be a string")
                  else:
                      if icon.startswith("https://"):
                          pass
                      else:
                          icon_path = pathlib.Path(icon)
                          if not icon_path.exists():
                              errors.append(f"{prefix}: icon file not found: {icon!r}")

          if errors:
              print("marketplace.json validation FAILED:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"marketplace.json OK ({len(entries)} entries)")
          PYEOF
