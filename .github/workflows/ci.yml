name: CI

on:
  push:
    branches: [main, feature/**, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: >
          pytest tests/
          -v --tb=short
          --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  skill-lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate SKILL.md
        run: |
          python << 'PYEOF'
          import yaml, pathlib
          p = pathlib.Path('src/dcc_mcp_maya_mgear/skills/maya-mgear/SKILL.md')
          for doc in yaml.safe_load_all(p.read_text()):
              if doc is not None:
                  data = doc
                  break
          assert data.get('name') == 'maya-mgear', 'Missing or wrong skill name'
          dcc_mcp = data.get('metadata', {}).get('dcc-mcp', {})
          assert 'depends' in dcc_mcp, 'Missing depends under metadata.dcc-mcp'
          print('SKILL.md OK')
          PYEOF

      - name: Validate tools.yaml
        run: |
          python << 'PYEOF'
          import yaml, pathlib
          p = pathlib.Path('src/dcc_mcp_maya_mgear/skills/maya-mgear/tools.yaml')
          data = yaml.safe_load(p.read_text())
          tools = data.get('tools', [])
          assert len(tools) == 5, f'Expected 5 tools, got {len(tools)}'
          names = [t['name'] for t in tools]
          assert 'inspect_mgear_environment' in names
          assert 'list_shifter_components' in names
          assert 'create_shifter_guide_from_template' in names
          assert 'build_shifter_rig' in names
          assert 'export_shifter_guide_template' in names
          print(f'All {len(tools)} tools validated OK: {names}')
          PYEOF
