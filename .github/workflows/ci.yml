name: CI

on:
  push:
    branches: [main, feature/**, feat/**, release-please--branches--main--**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check skill/

      - name: Run ruff format check
        run: ruff format --check skill/

  skill-lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate canonical SKILL.md
        run: |
          python << 'PYEOF'
          import yaml, pathlib, sys
          CANONICAL_SKILL = 'skill/maya-mgear/SKILL.md'
          p = pathlib.Path(CANONICAL_SKILL)
          for doc in yaml.safe_load_all(p.read_text()):
              if doc is not None:
                  data = doc
                  break
          assert data.get('name') == 'maya-mgear', f'{CANONICAL_SKILL}: Missing or wrong skill name'
          dcc_mcp = data.get('metadata', {}).get('dcc-mcp', {})
          assert 'depends' in dcc_mcp, f'{CANONICAL_SKILL}: Missing depends under metadata.dcc-mcp'
          print(f'{CANONICAL_SKILL} OK')
          PYEOF

      - name: Validate canonical tools.yaml
        run: |
          python << 'PYEOF'
          import yaml, pathlib, sys
          CANONICAL_TOOLS = 'skill/maya-mgear/tools.yaml'
          p = pathlib.Path(CANONICAL_TOOLS)
          data = yaml.safe_load(p.read_text())
          tools = data.get('tools', [])
          assert len(tools) == 6, f'{CANONICAL_TOOLS}: Expected 6 tools, got {len(tools)}'
          names = [t['name'] for t in tools]
          assert 'inspect_mgear_environment' in names
          assert 'list_shifter_components' in names
          assert 'create_shifter_guide_from_template' in names
          assert 'build_shifter_rig' in names
          assert 'export_shifter_guide_template' in names
          assert 'import_shifter_sample_template' in names
          print(f'{CANONICAL_TOOLS}: All {len(tools)} tools validated OK: {names}')
          PYEOF

      - name: Verify no forbidden root-level skill files
        run: |
          echo "## Layout guard: no forbidden root-level skill files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          forbidden=0

          for path in "SKILL.md" "tools.yaml" "metadata/depends.md" "scripts/"; do
            if [ -e "$path" ]; then
              echo "❌ Forbidden root-level path exists: $path" >> $GITHUB_STEP_SUMMARY
              forbidden=1
            fi
          done

          if [ $forbidden -ne 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Action required" >> $GITHUB_STEP_SUMMARY
            echo "Root-level SKILL.md, tools.yaml, metadata/, and scripts/ are forbidden." >> $GITHUB_STEP_SUMMARY
            echo "The canonical path for all skill files is skill/maya-mgear/." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ No forbidden root-level skill files" >> $GITHUB_STEP_SUMMARY

  marketplace-lint:
    name: Lint Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate marketplace.json
        run: |
          python << 'PYEOF'
          import json, pathlib, sys

          # -- schema: verbatim from dcc-mcp-core crates/dcc-mcp-catalog/src/lib.rs --
          # MARKETPLACE_V1_SCHEMA_JSON — single source of truth for marketplace-v1.
          # Any drift between this CI check and core's Rust-side loader is a bug.
          SCHEMA = {
              "$schema": "https://json-schema.org/draft/2020-12/schema",
              "$id": "https://dcc-mcp.github.io/schemas/marketplace-v1.schema.json",
              "title": "DCC-MCP Marketplace Catalog",
              "description": "Schema for marketplace.json catalog entries",
              "type": "object",
              "required": ["entries"],
              "properties": {
                  "version": {"type": "string"},
                  "entries": {
                      "type": "array",
                      "items": {"$ref": "#/$defs/entry"}
                  }
              },
              "additionalProperties": False,
              "$defs": {
                  "entry": {
                      "type": "object",
                      "required": ["name", "description"],
                      "properties": {
                          "name":        {"type": "string", "minLength": 1},
                          "description": {"type": "string", "minLength": 1},
                          "dcc":         {"type": "array", "items": {"type": "string"}, "uniqueItems": True},
                          "url":         {"type": "string"},
                          "tags":        {"type": "array", "items": {"type": "string"}, "uniqueItems": True},
                          "version":          {"type": "string"},
                          "min_core_version": {"type": "string"},
                          "icon":             {"type": "string"},
                          "maintainer":       {"type": "string"},
                          "install": {
                              "type": "object",
                              "required": ["type"],
                              "properties": {
                                  "type":   {"type": "string", "enum": ["git", "zip", "path"]},
                                  "url":    {"type": "string"},
                                  "ref":    {"type": "string"},
                                  "sha256": {"type": "string"}
                              },
                              "additionalProperties": False
                          }
                      },
                      "additionalProperties": False
                  }
              }
          }

          from jsonschema import validate, ValidationError

          p = pathlib.Path("marketplace.json")
          assert p.exists(), "marketplace.json not found"

          with open(p) as f:
              data = json.load(f)

          try:
              validate(instance=data, schema=SCHEMA)
          except ValidationError as e:
              print(f"marketplace.json validation FAILED: {e.message}")
              print(f"  at: {'/'.join(str(p) for p in e.absolute_path)}")
              if e.absolute_schema_path:
                  print(f"  schema path: {'/'.join(str(p) for p in e.absolute_schema_path)}")
              sys.exit(1)

          # additional repo-level check: relative icon paths must exist on disk
          errors = []
          for i, entry in enumerate(data.get("entries", [])):
              icon = entry.get("icon")
              if icon and isinstance(icon, str) and not icon.startswith("https://"):
                  if not pathlib.Path(icon).exists():
                      errors.append(f"entries[{i}].icon: file not found: {icon!r}")
          if errors:
              print("icon file check FAILED:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"marketplace.json OK ({len(data.get('entries', []))} entries)")
          PYEOF

  skill-package:
    name: Validate Skill Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate skill package layout
        run: |
          python << 'PYEOF'
          import yaml, pathlib, sys

          CANONICAL = pathlib.Path('skill/maya-mgear')
          errors = []

          # SKILL.md must exist and have required frontmatter
          skill_md = CANONICAL / 'SKILL.md'
          if not skill_md.is_file():
              errors.append(f'{skill_md}: missing')
          else:
              data = None
              for doc in yaml.safe_load_all(skill_md.read_text()):
                  if doc is not None:
                      data = doc
                      break
              if data is None or data.get('name') != 'maya-mgear':
                  errors.append(f'{skill_md}: missing or wrong name in frontmatter')

          # tools.yaml must exist and list exactly 6 tools
          tools_yaml = CANONICAL / 'tools.yaml'
          if not tools_yaml.is_file():
              errors.append(f'{tools_yaml}: missing')
          else:
              data = yaml.safe_load(tools_yaml.read_text())
              tools = data.get('tools', [])
              if len(tools) != 6:
                  errors.append(f'{tools_yaml}: expected 6 tools, got {len(tools)}')

          # metadata/depends.md must exist
          depends_md = CANONICAL / 'metadata' / 'depends.md'
          if not depends_md.is_file():
              errors.append(f'{depends_md}: missing')

          # scripts/ must contain .py files
          scripts_dir = CANONICAL / 'scripts'
          if not scripts_dir.is_dir():
              errors.append(f'{scripts_dir}: missing')
          else:
              py_files = list(scripts_dir.glob('*.py'))
              if not py_files:
                  errors.append(f'{scripts_dir}: no Python scripts found')

          if errors:
              print('Skill package validation FAILED:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          print(f'Skill package OK: {CANONICAL}')
          PYEOF
