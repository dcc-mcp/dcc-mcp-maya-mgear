name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name (e.g. v0.1.0). Leave empty for release-please."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || inputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  test:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          pip install ".[dev]"
          pytest tests/ -v --tb=short

  publish-release-assets:
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          git archive --format=zip --output=dcc-mcp-maya-mgear-${{ needs.release-please.outputs.tag_name }}.zip HEAD

      - name: Attach source archive to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dcc-mcp-maya-mgear-${{ needs.release-please.outputs.tag_name }}.zip

  sync-marketplace:
    needs: [release-please, publish-release-assets]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update marketplace.json version
        run: |
          VERSION='${{ needs.release-please.outputs.version }}'
          python3 -c "
          import json
          # Update root marketplace.json (this package's own registration)
          with open('marketplace.json', 'r') as f:
              data = json.load(f)
          data['entries'][0]['version'] = '$VERSION'
          with open('marketplace.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push marketplace.json update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace.json
          git commit -m "chore: sync marketplace.json version to ${{ needs.release-please.outputs.version }}" || echo "No changes to commit"
          git push
